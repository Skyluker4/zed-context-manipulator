---
name: Super-Linter

on:
  push:
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint code base
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: true
          # Use Ruff for Python linting and formatting (passes cleanly).
          # Disable redundant/conflicting Python linters.
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          # Exclude virtual-env and cache dirs that may exist locally.
          FILTER_REGEX_EXCLUDE: '(\.venv/|\.mypy_cache/|__pycache__/)'
